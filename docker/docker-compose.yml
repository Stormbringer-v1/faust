# ──────────────────────────────────────────────────────────────────────
# Faust — Docker Compose (Production-like)
# Usage: docker compose -f docker/docker-compose.yml up -d
# ──────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-faust}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-faust}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-faust}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker (Scans/Default) ────────────────────────────────
  celery-worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    command: >
      celery -A app.services.celery_app worker
      -Q celery,scans
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=100
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.services.celery_app inspect ping -d celery@$$HOSTNAME --timeout 5 2>&1 | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker (Sync) ─────────────────────────────────────────
  celery-worker-sync:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    command: >
      celery -A app.services.celery_app worker
      -Q sync
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=50
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.services.celery_app inspect ping -d celery@$$HOSTNAME --timeout 5 2>&1 | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Beat (scheduler) ─────────────────────────────────────
  celery-beat:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    command: >
      celery -A app.services.celery_app beat
      --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.services.celery_app status 2>&1 | grep -v 'Error' || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend SPA ─────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
