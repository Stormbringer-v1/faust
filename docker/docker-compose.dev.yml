# ──────────────────────────────────────────────────────────────────────
# Faust — Docker Compose Dev Overrides
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up
# ──────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app
    volumes:
      - ../backend:/app
    environment:
      DEBUG: "true"
      ENVIRONMENT: development

  celery-worker:
    volumes:
      - ../backend:/app
    command: >
      celery -A app.services.celery_app worker
      --loglevel=debug
      --concurrency=2
    environment:
      DEBUG: "true"
      ENVIRONMENT: development

  celery-beat:
    volumes:
      - ../backend:/app
    environment:
      DEBUG: "true"
      ENVIRONMENT: development

  frontend:
    command: npm run dev
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
