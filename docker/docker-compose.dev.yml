# ──────────────────────────────────────────────────────────────────────
# Faust — Docker Compose Dev Overrides
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up
# ──────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app
    volumes:
      - ../backend:/app
    environment:
      DEBUG: "true"
      ENVIRONMENT: development

  celery-worker:
    volumes:
      - ../backend:/app
    command: >
      celery -A app.services.celery_app worker
      -Q celery,scans,reports
      --loglevel=debug
      --concurrency=2
      --max-tasks-per-child=1
    environment:
      DEBUG: "true"
      ENVIRONMENT: development

  celery-beat:
    volumes:
      - ../backend:/app
    environment:
      DEBUG: "true"
      ENVIRONMENT: development

  # Frontend: use the production nginx image as-is.
  # For live dev, rebuild with: docker compose build frontend && docker compose up -d frontend
  # The dev overlay intentionally does NOT override the frontend command
  # because the production Dockerfile produces an nginx image (no npm).
