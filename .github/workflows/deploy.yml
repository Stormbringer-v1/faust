name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Pull & Restart on VM
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /root/faust
          git pull origin main

      - name: Restart services
        run: |
          cd /root/faust
          docker compose -f docker/docker-compose.yml up -d --build
          docker image prune -f
          echo "Deploy complete."
